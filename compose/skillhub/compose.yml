services:
  server:
    image: ghcr.io/iflytek/skillhub-server:latest
    restart: unless-stopped
    ports:
      - "0.0.0.0:8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://172.16.0.1:5432/skillhub
      SPRING_DATASOURCE_USERNAME: skillhub
      SPRING_DATASOURCE_PASSWORD: skillhub_demo
      REDIS_HOST: 172.16.0.1
      REDIS_PORT: 6379
      SESSION_COOKIE_SECURE: "false"
      SKILLHUB_PUBLIC_BASE_URL: http://172.16.0.1
      DEVICE_AUTH_VERIFICATION_URI: ""
      SKILLHUB_STORAGE_PROVIDER: s3
      STORAGE_BASE_PATH: /var/lib/skillhub/storage
      SKILLHUB_STORAGE_S3_ENDPOINT: http://172.16.0.1:8000
      SKILLHUB_STORAGE_S3_PUBLIC_ENDPOINT: http://172.16.0.1:8000
      SKILLHUB_STORAGE_S3_BUCKET: skillhub
      SKILLHUB_STORAGE_S3_ACCESS_KEY: ""
      SKILLHUB_STORAGE_S3_SECRET_KEY: ""
      SKILLHUB_STORAGE_S3_REGION: us-east-1
      SKILLHUB_STORAGE_S3_FORCE_PATH_STYLE: "true"
      SKILLHUB_STORAGE_S3_AUTO_CREATE_BUCKET: "true"
      SKILLHUB_STORAGE_S3_PRESIGN_EXPIRY: PT10M
      SKILLHUB_SECURITY_SCANNER_ENABLED: "true"
      SKILLHUB_SECURITY_SCANNER_URL: http://172.16.0.1:8083
      SKILLHUB_SECURITY_SCANNER_MODE: upload
      BOOTSTRAP_ADMIN_ENABLED: "false"
      BOOTSTRAP_ADMIN_USER_ID: docker-admin
      BOOTSTRAP_ADMIN_USERNAME: admin
      BOOTSTRAP_ADMIN_PASSWORD: ChangeMe!2026
      BOOTSTRAP_ADMIN_DISPLAY_NAME: Admin
      BOOTSTRAP_ADMIN_EMAIL: admin@skillhub.local
      OAUTH2_GITHUB_CLIENT_ID: ""
      OAUTH2_GITHUB_CLIENT_SECRET: ""
    volumes:
      - ./storage:/var/lib/skillhub/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  web:
    image: ghcr.io/iflytek/skillhub-web:latest
    restart: unless-stopped
    ports:
      - "0.0.0.0:8082:80"
    environment:
      SKILLHUB_API_UPSTREAM: http://server:8080
      SKILLHUB_WEB_API_BASE_URL: ""
      SKILLHUB_PUBLIC_BASE_URL: http://172.16.0.1
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  skill-scanner:
    image: ghcr.io/iflytek/skillhub-scanner:latest
    restart: unless-stopped
    ports:
      - "0.0.0.0:8083:8000"
    environment:
      SKILL_SCANNER_LLM_API_KEY: ""
      SKILL_SCANNER_LLM_BASE_URL: ""
      SKILL_SCANNER_LLM_MODEL: ""
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
